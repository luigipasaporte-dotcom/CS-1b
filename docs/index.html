	<meta charset="utf-8">

	<title>Wandow Expi v6.7</title>
	<style type="text/css">
		body {
			margin: 0;
			padding: 0;
			font-family: "Miranda Sans", sans-serif;
			font-optical-sizing: auto;
			font-weight: 400;
			font-style: normal;
			font-size: 14px;
            background-image: url("img/frutiger.jpg");
			background-position: center;
			background-repeat: no-repeat;
			background-size: 100%;
		}

		img {
			max-width: 100%;
		}
		.outer {
			width: 1200px;
			height: 800px;
			background: white;
			position: relative;
			margin: auto;
			margin-top: 20px;
			box-sizing: border-box;
			background-color: grey;
			background-image: url('img/meowl.jpg'); 
			background-size: cover;
			box-shadow: 0px 0px 80px #ffffff78;
			border-radius: 8px;
		}
		.wandow {
            position: absolute;
			width: 300px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
		}

		.wandow::after {
			content: '';
			position: absolute;
			border-radius: 2px;
			inset: 0px;
			border-top: 2px solid #aeaeae;
			border-left: 2px solid #aeaeae;
			border-bottom: 2px solid #575757;
			border-right: 2px solid #575757;
			pointer-events: none;
		}

		.wandow.main {
			height: 700px;
			width: 550px;
			top: 40px;
			left: 560px;
		}
		.wandow.little {
			height: 250px;
			width: 250px;
			top: 410px;
			left: 330px;
		}

		/* MAKE THE LITTLE WINDOW SCROLL*/
		.wandow.little .content {
			overflow-y: auto;
		}

		.header	{
			background: linear-gradient(180deg, 
            rgba(172, 172, 172, .9) 0, 
            rgba(71, 71, 71, .9) 20%, 
            rgba(19, 19, 19, .9) 40%, 
            rgba(7, 7, 7, .93) 100%);
			color: #848484;
			padding: 6px 12px;
			border: 1px solid black;
			box-sizing: border-box;
			margin-bottom: 4px;
			font-family: monospace;
			font-size: 12px;
			letter-spacing: 1px;
			border-radius: 4px;
			cursor: move;
		}

		.content {
			height: calc(100% - 34px);
			width: 100%;

			box-sizing: border-box;
			border: 1px solid black;
			border-radius: 4px;
			position: relative;
		}

		.menu {
			height: 580px;
			position:absolute;
			width: 80px;
			left: 40px;
			top: 120px;
			text-align: center;
		}

		.menu a {
			display: block;
			margin-bottom: 20px;
			padding: 6px;
			background: transparent;
			border: 1px dashed transparent;
			border-radius: 6px;
			font-size: 14px;
		}

		.menu a:hover {
			display: block;
			margin-bottom: 20px;
			padding: 6px;
			background: #ffffff42;
			border-radius: 6px;
			font-size: 14px;
		}

		.menu img {
			display: block;
			margin: auto;
			margin-bottom: 4px;
		}

		.content iframe {
			border: 0;
			width: 100%;
			height: 100%;
		} 

		.title {
			font-family: "Pixelify Sans", system-ui;
			font-weight: 400;
			font-style: normal;
			color: white;
			text-shadow: 0px 0px 16px black;
			font-size: 36px;
			position: absolute;
			left: 42px;
			top: 40px;
            letter-spacing: 1px;
		}

		.menu-label {
            font-size: 15px;
			color: white;
			padding: 3px 6px;
			display: inline-block;
		}

		.statusbar {
			border: 2px solid #333;
			position: absolute;
			height: 30px;
			width: 100%;
			background: black;
			color: #868686;
			bottom: 0;
			font-size: 12px;
			line-height: 26px;
			padding: 0 6px;
			box-sizing: border-box;

			box-shadow: 3px 3px 16px black;

			border-bottom-left-radius: 8px;
			border-bottom-right-radius: 8px;
		}

		.statusbar a {
			color: #868686;
		}

		.statusbar-left {
			display: inline-block;
			float: left;
		}

		.statusbar-right {
			display: inline-block;
			float: right;
		}

		.statusbar-right a {
			text-decoration: none;
		}

		.statusbar-right svg {
			margin-left: 6px;
			margin-top: 3px;
			height: 20px;
		}

	</style>
